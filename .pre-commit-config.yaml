repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: lychee
        name: lychee (link check)
        entry: lychee --config .lychee.toml --no-progress
        language: system
        types: [markdown]
        exclude: ^\.venv/
      - id: tests
        name: tests
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
