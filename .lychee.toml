offline = false
include_fragments = true
include_verbatim = false
extensions = ["md"]
glob_ignore_case = true
exclude_path = ["^\\.venv/"]
# Tolerate slow external reference links (e.g. personal blogs) and our own site's
# cold-start/deploy windows so CI doesn't flake.
timeout = 30
max_retries = 4
retry_wait_time = 3
max_concurrency = 16
