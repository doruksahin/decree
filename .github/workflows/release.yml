name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"

jobs:
  validate:
    name: validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --group dev
      - name: Validate tag, version, changelog, and fragments
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          export TAG VERSION
          uv run python - <<'PY'
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              sys.exit(f"release tag must be vX.Y.Z, got {tag!r}")

          pyproject_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          if pyproject_version != version:
              sys.exit(f"tag {tag!r} does not match pyproject.toml version {pyproject_version!r}")

          changelog = Path("CHANGELOG.md").read_text()
          if not re.search(rf"^## v{re.escape(version)}(?:\s|$)", changelog, re.MULTILINE):
              sys.exit(f"CHANGELOG.md is missing a release section for v{version}")

          ignored = {"AGENTS.md", "README.md"}
          fragment_dir = Path("changelog.d")
          pending = sorted(
              path.name
              for path in fragment_dir.iterdir()
              if path.is_file() and not path.name.startswith(".") and path.name not in ignored
          )
          if pending:
              sys.exit(
                  "release has pending Towncrier fragments; run "
                  f"`uv run towncrier build --yes --version {version}` before tagging: {pending}"
              )
          PY
      - run: uv run decree --version
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run decree lint
      - run: uv run decree index verify
      - run: uv run pytest -q

  links:
    name: validate links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --no-progress '**/*.md'

  build:
    name: build distributions
    runs-on: ubuntu-latest
    needs: [validate, links]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  # NOTE: decree is NOT published to PyPI — the name `decree` there belongs to an
  # unrelated third-party project. Distribution is via this GitHub Release (wheel +
  # sdist attached below) and the Homebrew tap (bumped in the `homebrew` job).
  github-release:
    name: create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog = Path("CHANGELOG.md").read_text().splitlines()
          start = None
          for index, line in enumerate(changelog):
              if re.fullmatch(rf"## v{re.escape(version)}(?:\s.*)?", line):
                  start = index + 1
                  break
          if start is None:
              sys.exit(f"CHANGELOG.md is missing a release section for v{version}")

          end = len(changelog)
          for index in range(start, len(changelog)):
              if changelog[index].startswith("## "):
                  end = index
                  break

          notes = "\n".join(changelog[start:end]).strip()
          if not notes:
              sys.exit(f"CHANGELOG.md release section for v{version} is empty")
          Path("release-notes.md").write_text(notes + "\n")
          PY
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md

  # Point the Homebrew tap (doruksahin/homebrew-decree) at the new release sdist.
  # Requires repo secret HOMEBREW_TAP_TOKEN: a fine-grained PAT with Contents:write
  # on the homebrew-decree repo. The job is a no-op-safe bump; if the secret is
  # absent the checkout step fails loudly rather than publishing a stale formula.
  homebrew:
    name: bump Homebrew formula
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: doruksahin/homebrew-decree
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Bump formula to ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          url="https://github.com/doruksahin/decree/releases/download/${GITHUB_REF_NAME}/decree-${version}.tar.gz"
          # The release sdist is uploaded by the github-release job; poll until it
          # lands, and fail closed if it never does (don't hash a missing file).
          ok=
          for attempt in $(seq 1 12); do
            if curl -fsSL "$url" -o sdist.tar.gz; then ok=1; break; fi
            echo "sdist not ready yet (attempt $attempt); waiting…"; sleep 10
          done
          [ -n "$ok" ] || { echo "::error::release sdist never appeared at $url"; exit 1; }
          sha="$(sha256sum sdist.tar.gz | cut -d' ' -f1)"
          cd tap
          sed -i -E "s|^  url \".*\"|  url \"${url}\"|" Formula/decree.rb
          sed -i -E "s|^  sha256 \".*\"|  sha256 \"${sha}\"|" Formula/decree.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Idempotent: a re-run where the formula already matches is a no-op,
          # not a failure (git commit exits 1 on a clean tree under `set -e`).
          if git diff --quiet; then
            echo "Formula already at ${GITHUB_REF_NAME}; nothing to commit."
          else
            git commit -am "decree ${GITHUB_REF_NAME}"
            git push
          fi
